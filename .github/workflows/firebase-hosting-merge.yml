# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  test_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install function dependencies
        run: pip install -r requirements.txt
        working-directory: functions
      - name: Run atlas_chat unit tests
        run: python -m unittest test_atlas_chat.py
        working-directory: functions

  build_and_deploy:
    needs: test_functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PONDER_F84CE }}
          channelId: live
          projectId: ponder-f84ce

  deploy_functions:
    needs: test_functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PONDER_F84CE }}
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project ponder-f84ce --non-interactive
