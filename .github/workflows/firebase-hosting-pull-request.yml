name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  test_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install function dependencies
        run: pip install -r requirements.txt
        working-directory: functions
      - name: Run function unit tests
        run: |
          python -m unittest test_atlas_chat.py test_ci_config.py
        working-directory: functions
      - name: Run frontend cover URL tests
        run: node public/js/test_cover_url.js
      - name: Verify functions deploy readiness
        run: bash scripts/prepare_functions_venv.sh

  build_and_preview:
    needs: test_functions
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PONDER_F84CE }}
          projectId: ponder-f84ce
