<!-- Atlas/public/index.html -->

<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
		name="viewport"
		content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
		/>
		<title>Ponder AI | Atlas of Queer Literature</title>
		<link rel="stylesheet" href="/vendor/maplibre-gl.css" />
		<link rel="stylesheet" href="/styles.css?v=45" />
		<script src="/config.js"></script>
		<script>
			window.ATLAS_CHAT_ENDPOINT = (window.ATLAS_CONFIG && window.ATLAS_CONFIG.atlas && window.ATLAS_CONFIG.atlas.chatEndpoint) || "";
			window.ATLAS_CATALOG_ENDPOINT = (window.ATLAS_CONFIG && window.ATLAS_CONFIG.atlas && window.ATLAS_CONFIG.atlas.catalogEndpoint) || (window.ATLAS_CHAT_ENDPOINT ? window.ATLAS_CHAT_ENDPOINT.replace(/\/atlasChat\/?$/i, "/atlasCatalog") : "") || "/api/atlas/books";
			window.ATLAS_CHAT_DEBUG = new URLSearchParams(window.location.search).get("atlasChatDebug") === "1";
		</script>
	</head>
	<body>
		<header class="atlas-header" aria-label="Map title">
			<div class="atlas-header-inner">
				<div class="atlas-header-body">
					<a class="atlas-home"
						href="https://ponder-app.ai/"
						aria-label="Go to Ponder home">
						<svg class="atlas-home-icon" viewBox="0 0 24 24" aria-hidden="true">
							<path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
						</svg>
					</a>
					<div class="atlas-head">
						<h1 class="atlas-title">Atlas of Queer Literature</h1>
						<div class="atlas-subtitle">Ponder AI</div>
					</div>
				</div>
			</div>
		</header>

		<div class="atlas-top-right-tools">
			<div id="atlas-view-controls" class="atlas-view-controls">
				<div class="atlas-filter-controls" aria-hidden="true">
					<button type="button" id="atlas-filter-toggle" class="atlas-filter-toggle" aria-expanded="false" aria-controls="atlas-filter-panel">
						<svg class="atlas-filter-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
							<path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z" fill="currentColor"></path>
						</svg>
						<span class="atlas-filter-toggle-label">Filter</span>
						<span id="atlas-filter-badge" class="atlas-filter-badge" hidden aria-hidden="true"></span>
					</button>
					<span class="atlas-view-controls-divider" aria-hidden="true"></span>
				</div>
				<div class="atlas-view-toggle" role="group" aria-label="View mode">
					<button type="button" id="atlas-view-map" class="atlas-view-toggle-btn is-active" aria-label="Map view" aria-pressed="true">
						<svg class="atlas-view-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
							<path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z" fill="currentColor"></path>
						</svg>
					</button>
					<button type="button" id="atlas-view-list" class="atlas-view-toggle-btn" aria-label="List view" aria-pressed="false">
						<svg class="atlas-view-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
							<path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z" fill="currentColor"></path>
						</svg>
					</button>
				</div>
			</div>
			<div id="atlas-filter-panel" class="atlas-filter is-collapsed" role="dialog" aria-label="Filter books" aria-hidden="true">
				<div class="atlas-filter-shell">
					<div class="atlas-filter-header">
						<span class="atlas-filter-title">Filter</span>
						<button type="button" id="atlas-filter-clear" class="atlas-filter-clear">Clear</button>
					</div>
					<div class="atlas-filter-section">
						<div class="atlas-filter-label">Country</div>
						<div class="atlas-filter-country-search">
							<input type="search" id="atlas-filter-country-input" class="atlas-filter-country-input" placeholder="Search countries…" autocomplete="off" spellcheck="false" aria-controls="atlas-filter-country-results" aria-autocomplete="list" />
							<div id="atlas-filter-country-results" class="atlas-filter-country-results" role="listbox" aria-label="Country suggestions" hidden></div>
						</div>
					</div>
					<div class="atlas-filter-section">
						<div class="atlas-filter-label">Tags</div>
						<div id="atlas-filter-tags" class="atlas-filter-tags" aria-label="Filter by tags"></div>
					</div>
				</div>
			</div>
		</div>

		<main id="atlas-list-view" class="atlas-list-view" aria-label="Book catalog">
			<div id="atlas-list-view-inner" class="atlas-list-view-inner"></div>
		</main>

		<aside id="atlas-info" class="atlas-info" aria-live="polite" aria-atomic="true">
			<div class="atlas-info-row">
				<span id="atlas-flag" class="atlas-flag" role="img" aria-label="Country flag">🏳️</span>
				<span id="atlas-name" class="atlas-name">Country</span>
				<span id="atlas-book-count" class="atlas-book-count" hidden></span>
			</div>
			<div id="atlas-books" class="atlas-books"></div>
			<div id="atlas-empty" class="atlas-empty" hidden>We don't have any books from this country yet. If you have one you'd recommend, please let us know <a href="https://forms.gle/ZwvqKmMmUNZfWrcd8" target="_blank" rel="noopener">here</a>.</div>
		</aside>


		<div id="atlas-chat" class="atlas-chat is-collapsed" role="region" aria-label="Curator">
			<div id="atlas-app-banner" class="atlas-app-banner" role="region" aria-label="Download our news app">
				<button type="button" id="atlas-app-banner-dismiss" class="atlas-app-banner-dismiss" aria-label="Dismiss download banner">
					<svg class="atlas-app-banner-dismiss-icon" viewBox="0 0 24 24" aria-hidden="true">
						<path d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7A1 1 0 0 0 5.7 7.11L10.59 12 5.7 16.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.89a1 1 0 0 0 1.41-1.41L13.41 12l4.89-4.89a1 1 0 0 0 0-1.4z" fill="currentColor"></path>
					</svg>
				</button>
				<a class="atlas-app-banner-link"
					href="https://apps.apple.com/us/app/ponder-ai/id6503487947"
					target="_blank"
					rel="noopener noreferrer">
					<span class="atlas-app-banner-text">Download our news app!</span>
					<span class="atlas-app-banner-arrow" aria-hidden="true">
						<svg class="atlas-app-banner-arrow-icon" viewBox="0 0 24 24" fill="currentColor" focusable="false">
							<path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2zm1 5l5 5-5 5v-3H7v-4h6V7z"></path>
						</svg>
					</span>
				</a>
			</div>
			<div class="atlas-chat-shell">
				<div class="atlas-chat-body" aria-hidden="true">
					<div class="atlas-chat-header">
						<div class="atlas-chat-title">Curator</div>
						<button id="atlas-chat-clear" class="atlas-chat-clear" type="button">Clear</button>
					</div>
					<div id="atlas-chat-thread" class="atlas-chat-thread" role="log" aria-live="polite" aria-relevant="additions"></div>
					<div id="atlas-chat-followups" class="atlas-chat-followups-bar" hidden aria-label="Suggested follow-up questions"></div>
				</div>
				<div class="atlas-chat-input-row" role="form" aria-label="Send a message">
					<textarea id="atlas-chat-input" class="atlas-chat-input" rows="1" spellcheck="false" placeholder="Ask anything…"></textarea>
					<button id="atlas-chat-send" class="atlas-chat-send" type="button" aria-label="Send message">Send</button>
				</div>
			</div>
		</div>


		<div id="map" role="application" aria-label="World map highlighting countries on tap"></div>

		<script src="/vendor/maplibre-gl.js"></script>
		<script type="module" src="/js/app.js?v=atlas-v38"></script>
	</body>
</html>
